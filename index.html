<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ROTMG Tools — Introduction</title>
  <link rel="stylesheet" href="builds.css">
  <link rel="stylesheet" href="enchanting-sim/style.css">
  <link rel="stylesheet" href="key-sim/style.css">
  <script>
    (function () {
      var map = {
        rogue: 'classes/rogue.html',
        wizard: 'classes/wizard.html',
        ninja: 'classes/ninja.html',
        samurai: 'classes/samurai.html',
        kensei: 'classes/kensei.html',
        knight: 'classes/knight.html',
        warrior: 'classes/warrior.html',
        paladin: 'classes/paladin.html',
        priest: 'classes/priest.html',
        mystic: 'classes/mystic.html',
        necromancer: 'classes/necromancer.html',
        summoner: 'classes/summoner.html',
        assassin: 'classes/assassin.html',
        archer: 'classes/archer.html',
        bard: 'classes/bard.html',
        druid: 'classes/druid.html'
      };
      var p = new URLSearchParams(window.location.search).get('class');
      if (p && map[p]) {
        window.location.replace(map[p]);
      }
    })();
  </script>
</head>
<body class="home-intro has-site-nav">
  <script src="site-nav.js"></script>
  <main class="home-intro__main">
    <div class="home-intro__prose" id="introView"></div>
    <section class="home-enchant-view" id="enchantView" hidden>
      <div id="enchantSimMount"></div>
    </section>
    <section class="home-key-view" id="keyView" hidden>
      <div id="keySimMount"></div>
    </section>
  </main>
  <script src="enchanting-sim/embed.js"></script>
  <script src="key-sim/embed.js"></script>
  <script>
    (function () {
      var introEl = document.getElementById("introView");
      var enchantView = document.getElementById("enchantView");
      var enchantMount = document.getElementById("enchantSimMount");
      var keyView = document.getElementById("keyView");
      var keyMount = document.getElementById("keySimMount");
      if (!introEl || !enchantView || !enchantMount || !keyView || !keyMount) return;

      var params = new URLSearchParams(window.location.search);
      var view = params.get("view");
      var showingEnchant = view === "enchant-sim";
      var showingKey = view === "key-sim";
      var enchantMounted = false;
      var enchantMountPromise = null;
      var keyMounted = false;
      var keyMountPromise = null;

      function loadIntro() {
        if (introEl.dataset.loaded === "true") return;
        fetch("intro.html", { cache: "no-cache" })
          .then(function (r) {
            if (!r.ok) throw new Error(String(r.status));
            return r.text();
          })
          .then(function (html) {
            introEl.innerHTML = html;
            introEl.dataset.loaded = "true";
          })
          .catch(function () {
            introEl.innerHTML =
              '<p class="home-intro__load-error">Could not load the introduction. Try refreshing, or open <a class="home-intro__tool-link" href="intro.html">intro.html</a> directly.</p>';
            introEl.dataset.loaded = "true";
          });
      }

      function showIntro() {
        document.title = "ROTMG Tools — Introduction";
        introEl.hidden = false;
        enchantView.hidden = true;
        keyView.hidden = true;
        document.body.classList.add("home-intro");
        loadIntro();
      }

      function showEnchantSim() {
        document.title = "ROTMG Tools — Enchantment Sim";
        introEl.hidden = true;
        keyView.hidden = true;
        enchantView.hidden = false;
        document.body.classList.remove("home-intro");
        if (typeof window.mountEnchantingSim === "function") {
          if (enchantMounted) return;
          if (!enchantMountPromise) {
            enchantMountPromise = window
              .mountEnchantingSim(enchantMount, {
                pagePath: "enchanting-sim/main.html",
                dataBasePath: "enchanting-sim"
              })
              .then(function () {
                enchantMounted = true;
              })
              .catch(function () {
                enchantMountPromise = null;
                enchantMounted = false;
                throw new Error("mount failed");
              });
          }
          enchantMountPromise.catch(function () {
            enchantMount.innerHTML =
              '<p class="home-intro__load-error">Could not load the enchantment simulator.</p>';
          });
        } else {
          enchantMount.innerHTML =
            '<p class="home-intro__load-error">Simulator loader is unavailable.</p>';
        }
      }

      function showKeySim() {
        document.title = "ROTMG Tools — Key sim";
        introEl.hidden = true;
        enchantView.hidden = true;
        keyView.hidden = false;
        document.body.classList.remove("home-intro");
        if (typeof window.mountKeySim === "function") {
          if (keyMounted) return;
          if (!keyMountPromise) {
            keyMountPromise = window
              .mountKeySim(keyMount, {
                pagePath: "key-sim/main.html",
                dataBasePath: "key-sim"
              })
              .then(function () {
                keyMounted = true;
              })
              .catch(function () {
                keyMountPromise = null;
                keyMounted = false;
                throw new Error("mount failed");
              });
          }
          keyMountPromise.catch(function () {
            keyMount.innerHTML =
              '<p class="home-intro__load-error">Could not load the key simulator.</p>';
          });
        } else {
          keyMount.innerHTML =
            '<p class="home-intro__load-error">Key sim loader is unavailable.</p>';
        }
      }

      if (showingEnchant) {
        showEnchantSim();
      } else if (showingKey) {
        showKeySim();
      } else {
        showIntro();
      }
    })();
  </script>
</body>
</html>
