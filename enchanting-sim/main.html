<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Enchant Simulator</title>
<link href="../builds.css" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
</head>
<body class="has-site-nav">
<script src="../site-nav.js"></script>
<div class="enchant-sim-shell">
<div class="container">
<h1>Enchant Simulator - by evolz</h1>
<div class="card cols">
<div class="col">
<h3>Choose Item Type</h3>
<select id="itemType">
<option value="WEAPON" selected>Weapon</option>
<option value="ABILITY">Ability</option>
<option value="ARMOR">Armor</option>
<option value="RING">Ring</option>
</select>
<div class="awaken-row">
<label class="inline"><input id="canAwaken" type="checkbox"/> Can be Awakened</label>
<input id="awakenItem" placeholder="Type to search awakenable items..." type="text"/>
</div>
</div>
<div class="col aug-wrap">
<h3>Choose Artifact / Card</h3>
<select id="artifactCard"></select>
<div id="augmentInfo"></div>
<div class="roll-actions">
<button id="rollBtn">Roll Enchantments</button>
<button id="resetDust">Reset Dust</button>
</div>
<div>
<span class="muted" id="dustDisplay">Total Dust Used: 0</span>
<span id="rollDelta"></span>
</div>
</div>
</div>
<div class="card eligibility-bar" id="eligibility">
<div class="eligibility-bar__inner">
<div class="eligibility-slot-row">
<span class="eligibility-slot-row__label">Slot count</span>
<div id="slotSelector"></div>
</div>
<span id="eligibilityText"></span>
</div>
</div>
<div class="card slot-container" id="slotsContainer"></div>
<div class="card">
<div class="toggle-row">
<h3 style="margin:0">Weight Breakdown (after multipliers)</h3>
<button class="small" id="toggleWeightBtn">Show</button>
</div>
<div id="weightDetails"></div>
</div>
<div class="card" id="simulationTool">
<h3>Enchant Simulation</h3>
<div class="prob-row">
<button aria-label="Fill target enchant with awakened line for this item" class="small" id="fillAwakenedEnchantBtn" style="display:none" type="button">Awakened enchant</button>
</div>
<fieldset id="pathPhasesFieldset">
<div class="path-row" id="pathPhasesMount"></div>
</fieldset>
<div class="path-controls">
<label class="inline" for="pathBatchTrialsInput">Paths per run</label>
<input id="pathBatchTrialsInput" type="number" min="1" max="1000000" step="1" value="10000" inputmode="numeric" title="Number of independent path simulations per click (1–1,000,000)"/>
<button id="calcPathBtn" type="button">Run 10,000 paths</button>
</div>
<div class="sim-results">
<div class="sim-result-block">
<h4>Quick Estimate</h4>
<div class="muted" id="probResult"></div>
</div>
<div class="sim-result-block">
<h4>Path Batch</h4>
<div class="muted" id="pathResult"></div>
</div>
</div>
</div>
<div class="card" id="compareCardsTool">
<h3>Compare Cards</h3>
<div class="compare-cards-target-block">
<label class="compare-cards-target-label" for="compareCardsTargetInput">Target enchant(s)</label>
<div class="compare-cards-actions prob-row">
<input class="path-phase-input" id="compareCardsTargetInput" placeholder="Type enchant name first." type="text"/>
<button id="compareCardsBtn" type="button">Compare All Cards</button>
</div>
</div>
<div class="muted" id="compareCardsResult"></div>
<div class="compare-cards-table-wrap">
<table id="compareCardsTable">
<thead>
<tr>
<th>Rank</th>
<th>Card</th>
<th>Probability</th>
<th>Hits/Trials</th>
<th>Expected Dust</th>
<th>Expected Rolls</th>
<th>Notes</th>
</tr>
</thead>
<tbody id="compareCardsTableBody"></tbody>
</table>
</div>
</div>
</div>
</div>
<script src="js/sim-globals.js"></script>
<script src="js/path-sim-core.js"></script>
<script src="js/sim-logic-helpers.js"></script>
<script src="js/sim-logic-ui.js"></script>
<script src="js/sim-logic-simulation.js"></script>
<script src="js/sim-logic-bindings.js"></script>
<script src="js/sim-autocomplete.js"></script>
<script src="js/sim-bootstrap.js"></script>
</body>
</html>
