<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Enchant Simulator</title>
<link href="../builds.css" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
</head>
<body class="has-site-nav">
<script src="../site-nav.js"></script>
<div class="enchant-sim-shell">
<div class="container">
<h1>Enchant Simulator - by evolz</h1>
<div class="card cols">
<div class="col">
<h3>Choose Item Type</h3>
<select id="itemType">
<option value="">-- Select Item --</option>
<option value="WEAPON">Weapon</option>
<option value="ABILITY">Ability</option>
<option value="ARMOR">Armor</option>
<option value="RING">Ring</option>
</select>
<div class="awaken-row">
<label class="inline"><input id="canAwaken" type="checkbox"/> Can be Awakened</label>
<input id="awakenItem" placeholder="Type to search awakenable items..." type="text"/>
</div>
</div>
<div class="col aug-wrap">
<h3>Choose Artifact / Card</h3>
<select id="artifactCard"></select>
<div id="augmentInfo"></div>
<div>
<button id="rollBtn">Roll Enchantments</button>
<button id="resetDust">Reset Dust</button>
</div>
<div>
<span class="muted" id="dustDisplay">Total Dust Used: 0</span>
<span id="rollDelta"></span>
</div>
</div>
</div>
<div class="card eligibility-bar" id="eligibility">
<div class="eligibility-bar__inner">
<div class="eligibility-slot-row">
<span class="eligibility-slot-row__label">Slot count</span>
<div id="slotSelector"></div>
</div>
<span id="eligibilityText"></span>
</div>
</div>
<div class="card slot-container" id="slotsContainer"></div>
<div class="card">
<div class="toggle-row">
<h3 style="margin:0">Weight Breakdown (after multipliers)</h3>
<button class="small" id="toggleWeightBtn">Show</button>
</div>
<div id="weightDetails"></div>
</div>
<div class="card" id="probabilityTool">
<h3>Target Enchantment Probability</h3>
<div class="prob-row">
<input id="targetEnchantInput" placeholder="Type enchantment name..." type="text"/>
<button aria-label="Fill target enchant with awakened line for this item" class="small" id="fillAwakenedEnchantBtn" style="display:none" type="button">Awakened enchant</button>
<button id="calcProbBtn">Calculate Probability</button>
<label class="inline"><input id="compareCardsMode" type="checkbox"/> Compare Cards</label>
</div>
<div class="muted" id="probResult"></div>
</div>
</div>
</div>
<script src="js/sim-globals.js"></script>
<script src="js/sim-logic.js"></script>
<script src="js/sim-autocomplete.js"></script>
<script src="js/sim-bootstrap.js"></script>
</body>
</html>
